# Farm Bridge Automations - Ray's Berry Farm
# Fires on sensor.farm_* entities pushed by farm-bridge every 10 minutes.

automation:

  - id: farm_bridge_frost_alert
    alias: "Farm - Frost Risk Detected"
    trigger:
      - platform: state
        entity_id: sensor.farm_frost_risk
        to: "warning"
      - platform: state
        entity_id: sensor.farm_frost_risk
        to: "critical"
    action:
      - service: persistent_notification.create
        data:
          title: "Frost Risk - {{ states('sensor.farm_growth_stage') }}"
          message: >
            Frost forecast during {{ states('sensor.farm_growth_stage') }} stage.
            GDD: {{ states('sensor.farm_gdd') }}.
            Check the 7-day forecast and prepare frost protection.
          notification_id: farm_frost
    mode: single

  - id: farm_bridge_fungal_alert
    alias: "Farm - High Fungal Risk"
    trigger:
      - platform: numeric_state
        entity_id: sensor.farm_fungal_risk
        above: 70
        for:
          minutes: 20
    action:
      - service: persistent_notification.create
        data:
          title: "High Fungal Disease Risk"
          message: >
            Fungal risk score: {{ states('sensor.farm_fungal_risk') }}/100.
            Spray window is {{ states('sensor.farm_spray_window') }}.
            Growth stage: {{ states('sensor.farm_growth_stage') }}.
          notification_id: farm_fungal
    mode: single

  - id: farm_bridge_spray_open
    alias: "Farm - Spray Window Opened"
    trigger:
      - platform: state
        entity_id: sensor.farm_spray_window
        to: "open"
    condition:
      - condition: numeric_state
        entity_id: sensor.farm_fungal_risk
        above: 50
    action:
      - service: persistent_notification.create
        data:
          title: "Spray Window Open"
          message: >
            Conditions suitable for application.
            Fungal risk is {{ states('sensor.farm_fungal_risk') }}/100.
          notification_id: farm_spray_open
    mode: single

  - id: farm_bridge_yield_threat
    alias: "Farm - High Yield Threat Score"
    trigger:
      - platform: numeric_state
        entity_id: sensor.farm_yield_threat
        above: 55
        for:
          minutes: 30
    action:
      - service: persistent_notification.create
        data:
          title: "Elevated Yield Threat"
          message: >
            Composite yield threat score: {{ states('sensor.farm_yield_threat') }}/100.
            Stage: {{ states('sensor.farm_growth_stage') }}.
            SWD: {{ states('sensor.farm_swd_risk') }}.
            Frost risk: {{ states('sensor.farm_frost_risk') }}.
          notification_id: farm_yield_threat
    mode: single

  - id: farm_bridge_nws_alert
    alias: "Farm - NWS Alert Active"
    trigger:
      - platform: numeric_state
        entity_id: sensor.farm_nws_alerts
        above: 0
    action:
      - service: persistent_notification.create
        data:
          title: "NWS Weather Alert"
          message: >
            {{ states('sensor.farm_nws_alerts') }} active NWS alert(s) for Jersey County.
          notification_id: farm_nws
    mode: single

  - id: farm_bridge_harvest_ready
    alias: "Farm - Harvest Window Open"
    trigger:
      - platform: state
        entity_id: sensor.farm_growth_stage
        to: "Harvest Ready"
    action:
      - service: persistent_notification.create
        data:
          title: "Harvest Window Open"
          message: >
            GDD threshold reached - {{ states('sensor.farm_gdd') }} GDD accumulated.
            SWD pressure: {{ states('sensor.farm_swd_risk') }}.
          notification_id: farm_harvest_ready
    mode: single
