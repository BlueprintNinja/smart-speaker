# Master Valve Irrigation — 8-Zone Blackberry System
# Ray's Berry Farm
#
# Hardware: Tuya/Smart Life Dual Zone WiFi Water Timer (brass inlets)
#           Entities: switch.tuya_master_valve_1 (Outlet 1 → Rainwave A)
#                     switch.tuya_master_valve_2 (Outlet 2 → Rainwave B)
#           + 2x Rainwave RW-74ZWT-2 4-Zone Timers
#
# Plumbing: Spigot → Hammer Arrestor → Tuya Dual Timer
#           Outlet 1 → Hose → Rainwave A → Rows 1-4
#           Outlet 2 → Hose → Rainwave B → Rows 5-8
#
# Logic: HA controls both Tuya outlets (the "gatekeeper"). The Rainwaves handle
#        zone sequencing on their own battery timers. HA decides IF water flows.

# ── Template Sensor: Which row is currently being watered? ──────────────────
template:
  - sensor:
      - name: "Blackberry Row Status"
        unique_id: blackberry_row_status
        icon: mdi:fruit-cherries
        state: >
          {% set v1 = states('input_boolean.tuya_master_valve_1') %}
          {% set v2 = states('input_boolean.tuya_master_valve_2') %}
          {% set t = now().strftime('%H:%M') %}
          {% if v1 == 'off' and v2 == 'off' %} Idle
          {% elif '06:00' <= t < '07:00' %} Watering Rows 1-4 (Timer A)
          {% elif '07:00' <= t < '08:00' %} Watering Rows 5-8 (Timer B)
          {% elif '05:55' <= t < '08:15' %} System Pressurized (Standby)
          {% else %} Idle
          {% endif %}
        attributes:
          valve_1: "{{ states('input_boolean.tuya_master_valve_1') }}"
          valve_2: "{{ states('input_boolean.tuya_master_valve_2') }}"
          soil_moisture: "{{ states('sensor.rainpoint_soil_moisture') }}%"
          soil_status: "{{ states('sensor.soil_moisture_status') }}"
          total_zones: 8
          schedule_start: "06:00"
          schedule_end: "08:00"
          minutes_per_zone: 15

# ── Automation: Daily Gatekeeper (Weather Skip) ────────────────────────────
automation:
  - id: sky_irrigation_daily_gatekeeper
    alias: "Sky - Irrigation Daily Gatekeeper"
    description: >
      Opens both Tuya valve outlets at 5:50 AM if weather is dry and soil needs water.
      Stays on for 2h25m to cover both Rainwave timer cycles (8 zones × 15min).
      Skips if raining, >40% rain probability today OR tomorrow, or soil already saturated.
    mode: single
    trigger:
      - platform: time
        at: "05:50:00"
    condition:
      - condition: and
        conditions:
          # Skip if currently raining
          - condition: template
            value_template: "{{ states('weather.home') not in ['rainy', 'pouring'] }}"
          # Skip if rain probability > 40% today OR tomorrow (48h look-ahead)
          - condition: template
            value_template: >
              {% set f = state_attr('weather.home', 'forecast') %}
              {{ f is not none and
                 f[0].precipitation_probability | default(0) < 40 and
                 f[1].precipitation_probability | default(0) < 60 }}
          # Skip if soil is already wet (above wet threshold from RainPoint)
          - condition: template
            value_template: >
              {{ states('sensor.rainpoint_soil_moisture') | float(-1) < 0 or
                 states('sensor.rainpoint_soil_moisture') | float(0) <
                 states('input_number.rainpoint_wet_threshold') | float(75) }}
    action:
      - service: input_boolean.turn_on
        target:
          entity_id:
            - input_boolean.tuya_master_valve_1
            - input_boolean.tuya_master_valve_2
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.tuya_master_valve_1"
          state: "on"
          message: >
            Both Tuya valve outlets opened — daily blackberry irrigation starting.
            Weather: {{ states('weather.home') }}.
            Soil moisture: {{ states('sensor.rainpoint_soil_moisture') }}%
            (threshold: {{ states('input_number.rainpoint_wet_threshold') }}%).
          severity: "info"
      - delay: "02:25:00"
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.tuya_master_valve_1
            - input_boolean.tuya_master_valve_2
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.tuya_master_valve_1"
          state: "off"
          message: "Both Tuya valve outlets closed — daily irrigation cycle complete (8 zones × 15min)."
          severity: "info"

  # Closed-loop: stop irrigation if soil moisture reaches wet threshold mid-cycle
  - id: sky_irrigation_moisture_shutoff
    alias: "Sky - Irrigation Moisture Shutoff"
    description: "Closes valves immediately if soil moisture reaches the wet threshold during a watering cycle."
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.rainpoint_soil_moisture
        above: input_number.rainpoint_wet_threshold
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.tuya_master_valve_1
            state: "on"
          - condition: state
            entity_id: input_boolean.tuya_master_valve_2
            state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.tuya_master_valve_1
            - input_boolean.tuya_master_valve_2
      - service: rest_command.sky_alert
        data:
          sensor: "sensor.rainpoint_soil_moisture"
          state: "closed_loop_shutoff"
          message: >
            Closed-loop shutoff — soil moisture reached
            {{ states('sensor.rainpoint_soil_moisture') }}%
            (threshold: {{ states('input_number.rainpoint_wet_threshold') }}%).
            Both valves closed early to conserve water.
          severity: "info"

  # Weather skip notification — let Sky know when irrigation was skipped
  - id: sky_irrigation_weather_skip_notify
    alias: "Sky - Irrigation Weather Skip Notify"
    description: "Notifies Sky when daily irrigation is skipped due to weather"
    mode: single
    trigger:
      - platform: time
        at: "05:55:00"
    condition:
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ states('weather.home') in ['rainy', 'pouring'] }}"
          - condition: template
            value_template: >
              {{ state_attr('weather.home', 'forecast') is not none and
                 state_attr('weather.home', 'forecast')[0].precipitation_probability | default(0) >= 40 }}
          # Also skip if soil is already saturated
          - condition: template
            value_template: >
              {{ states('sensor.rainpoint_soil_moisture') | float(-1) >= 0 and
                 states('sensor.rainpoint_soil_moisture') | float(0) >=
                 states('input_number.rainpoint_wet_threshold') | float(75) }}
    action:
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.tuya_master_valve_1"
          state: "skipped"
          message: >
            Daily irrigation skipped —
            Weather: {{ states('weather.home') }},
            Rain probability: {{ state_attr('weather.home', 'forecast')[0].precipitation_probability | default('unknown') }}%,
            Soil moisture: {{ states('sensor.rainpoint_soil_moisture') }}%
            (wet threshold: {{ states('input_number.rainpoint_wet_threshold') }}%).
          severity: "info"

  # Bridge: mirror input_boolean state to real Tuya switch when hardware is connected.
  # This automation fires whenever the placeholder is toggled and forwards the command
  # to the physical switch if it exists in HA (i.e. Tuya integration is active).
  - id: sky_giex_valve_bridge_on
    alias: "Sky - GIEX Valve Bridge (ON)"
    description: "Mirrors input_boolean.tuya_master_valve_* to switch.tuya_master_valve_* when hardware is connected."
    mode: parallel
    trigger:
      - platform: state
        entity_id:
          - input_boolean.tuya_master_valve_1
          - input_boolean.tuya_master_valve_2
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ states(trigger.entity_id | replace('input_boolean.', 'switch.')) not in ['unknown', 'unavailable'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: "{{ trigger.entity_id | replace('input_boolean.', 'switch.') }}"

  - id: sky_giex_valve_bridge_off
    alias: "Sky - GIEX Valve Bridge (OFF)"
    description: "Mirrors input_boolean.tuya_master_valve_* to switch.tuya_master_valve_* when hardware is connected."
    mode: parallel
    trigger:
      - platform: state
        entity_id:
          - input_boolean.tuya_master_valve_1
          - input_boolean.tuya_master_valve_2
        to: "off"
    condition:
      - condition: template
        value_template: >
          {{ states(trigger.entity_id | replace('input_boolean.', 'switch.')) not in ['unknown', 'unavailable'] }}
    action:
      - service: switch.turn_off
        target:
          entity_id: "{{ trigger.entity_id | replace('input_boolean.', 'switch.') }}"

# ── Script: Manual Blackberry Watering (30min override) ─────────────────────
script:
  manual_blackberry_watering:
    alias: "Manual Blackberry Watering"
    icon: mdi:water-pump
    description: "Opens both Tuya valve outlets for on-demand watering."
    mode: restart
    fields:
      duration_minutes:
        description: "Override duration in minutes (default 30)"
        example: 30
    sequence:
      - variables:
          run_duration: "{{ duration_minutes | default(30) | int }}"
      - service: input_boolean.turn_on
        target:
          entity_id:
            - input_boolean.tuya_master_valve_1
            - input_boolean.tuya_master_valve_2
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.tuya_master_valve_1"
          state: "manual_on"
          message: "Manual watering started — both Tuya outlets open for {{ run_duration }} minutes."
          severity: "info"
      - delay:
          minutes: "{{ run_duration }}"
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.tuya_master_valve_1
            - input_boolean.tuya_master_valve_2
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.tuya_master_valve_1"
          state: "manual_off"
          message: "Manual watering complete — both Tuya outlets closed after {{ run_duration }} minutes."
          severity: "info"
