# Master Valve Irrigation — 8-Zone Blackberry System
# Ray's Berry Farm
#
# Hardware: Rain Bird CP075 inline valve + Orbit 57044 24V AC transformer
#           + TP-Link Kasa smart plug (switch.master_valve)
#           + 2x Rainwave battery timers (4 zones each, 15min/zone)
#
# Plumbing: Spigot → Hammer Arrestor → Master Valve → Long Hose → Y-Splitter
#           → 2x Rainwaves → 8 Blackberry Rows
#
# Logic: HA controls the master valve (the "gatekeeper"). The Rainwaves handle
#        zone sequencing on their own timers. HA just decides IF water flows today.

# ── Template Sensor: Which row is currently being watered? ──────────────────
template:
  - sensor:
      - name: "Blackberry Row Status"
        unique_id: blackberry_row_status
        icon: mdi:fruit-cherries
        state: >
          {% set master = states('switch.master_valve') %}
          {% set time = now().strftime('%H:%M') %}
          {% if master == 'off' %} Idle
          {% elif '06:00' <= time < '06:15' %} Row 1
          {% elif '06:15' <= time < '06:30' %} Row 2
          {% elif '06:30' <= time < '06:45' %} Row 3
          {% elif '06:45' <= time < '07:00' %} Row 4
          {% elif '07:00' <= time < '07:15' %} Row 5
          {% elif '07:15' <= time < '07:30' %} Row 6
          {% elif '07:30' <= time < '07:45' %} Row 7
          {% elif '07:45' <= time < '08:00' %} Row 8
          {% else %} Pressurized / Standby
          {% endif %}
        attributes:
          master_valve: "{{ states('switch.master_valve') }}"
          soil_moisture: "{{ states('sensor.rainpoint_soil_moisture') }}%"
          soil_status: "{{ states('sensor.soil_moisture_status') }}"
          total_zones: 8
          schedule_start: "06:00"
          schedule_end: "08:00"
          minutes_per_zone: 15

# ── Automation: Daily Gatekeeper (Weather Skip) ────────────────────────────
automation:
  - id: sky_irrigation_daily_gatekeeper
    alias: "Sky - Irrigation Daily Gatekeeper"
    description: >
      Opens the master valve at 5:50 AM if weather is dry.
      Stays on for 2h20m to cover both Rainwave timer cycles (8 zones × 15min).
      Skips if raining or >40% precipitation probability.
    mode: single
    trigger:
      - platform: time
        at: "05:50:00"
    condition:
      - condition: and
        conditions:
          # Skip if currently raining
          - condition: template
            value_template: "{{ states('weather.home') not in ['rainy', 'pouring'] }}"
          # Skip if rain probability > 40%
          - condition: template
            value_template: >
              {{ state_attr('weather.home', 'forecast') is not none and
                 state_attr('weather.home', 'forecast')[0].precipitation_probability | default(0) < 40 }}
          # Skip if soil is already wet (above wet threshold from RainPoint)
          - condition: template
            value_template: >
              {{ states('sensor.rainpoint_soil_moisture') | float(-1) < 0 or
                 states('sensor.rainpoint_soil_moisture') | float(0) <
                 states('input_number.rainpoint_wet_threshold') | float(75) }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.master_valve
      - service: rest_command.sky_alert
        data:
          sensor: "switch.master_valve"
          state: "on"
          message: >
            Master valve opened — daily blackberry irrigation starting.
            Weather: {{ states('weather.home') }}.
            Soil moisture: {{ states('sensor.rainpoint_soil_moisture') }}%
            (threshold: {{ states('input_number.rainpoint_wet_threshold') }}%).
          severity: "info"
      - delay: "02:20:00"
      - service: switch.turn_off
        target:
          entity_id: switch.master_valve
      - service: rest_command.sky_alert
        data:
          sensor: "switch.master_valve"
          state: "off"
          message: "Master valve closed — daily irrigation cycle complete (8 zones × 15min)."
          severity: "info"

  # Weather skip notification — let Sky know when irrigation was skipped
  - id: sky_irrigation_weather_skip_notify
    alias: "Sky - Irrigation Weather Skip Notify"
    description: "Notifies Sky when daily irrigation is skipped due to weather"
    mode: single
    trigger:
      - platform: time
        at: "05:55:00"
    condition:
      - condition: or
        conditions:
          - condition: template
            value_template: "{{ states('weather.home') in ['rainy', 'pouring'] }}"
          - condition: template
            value_template: >
              {{ state_attr('weather.home', 'forecast') is not none and
                 state_attr('weather.home', 'forecast')[0].precipitation_probability | default(0) >= 40 }}
          # Also skip if soil is already saturated
          - condition: template
            value_template: >
              {{ states('sensor.rainpoint_soil_moisture') | float(-1) >= 0 and
                 states('sensor.rainpoint_soil_moisture') | float(0) >=
                 states('input_number.rainpoint_wet_threshold') | float(75) }}
    action:
      - service: rest_command.sky_alert
        data:
          sensor: "switch.master_valve"
          state: "skipped"
          message: >
            Daily irrigation skipped —
            Weather: {{ states('weather.home') }},
            Rain probability: {{ state_attr('weather.home', 'forecast')[0].precipitation_probability | default('unknown') }}%,
            Soil moisture: {{ states('sensor.rainpoint_soil_moisture') }}%
            (wet threshold: {{ states('input_number.rainpoint_wet_threshold') }}%).
          severity: "info"

# ── Script: Manual Blackberry Watering (30min override) ─────────────────────
script:
  manual_blackberry_watering:
    alias: "Manual Blackberry Watering"
    icon: mdi:water-pump
    description: "Opens the master valve for 30 minutes for on-demand watering."
    mode: restart
    fields:
      duration_minutes:
        description: "Override duration in minutes (default 30)"
        example: 30
    sequence:
      - variables:
          run_duration: "{{ duration_minutes | default(30) | int }}"
      - service: switch.turn_on
        target:
          entity_id: switch.master_valve
      - service: rest_command.sky_alert
        data:
          sensor: "switch.master_valve"
          state: "manual_on"
          message: "Manual watering started — master valve open for {{ run_duration }} minutes."
          severity: "info"
      - delay:
          minutes: "{{ run_duration }}"
      - service: switch.turn_off
        target:
          entity_id: switch.master_valve
      - service: rest_command.sky_alert
        data:
          sensor: "switch.master_valve"
          state: "manual_off"
          message: "Manual watering complete — master valve closed after {{ run_duration }} minutes."
          severity: "info"
