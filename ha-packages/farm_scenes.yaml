# Farm Scenes — Ray's Berry Farm
# Pre-built scenes for common farm operations. Activate via voice:
#   "Hey Sky, activate morning routine"
#   "Hey Sky, turn on evening mode"

scene:
  - id: farm_morning_routine
    name: "Farm Morning Routine"
    icon: mdi:weather-sunset-up
    entities:
      input_boolean.irrigation_zone_1:
        state: "on"
      input_boolean.light_barn:
        state: "on"
      input_boolean.light_field:
        state: "on"

  - id: farm_evening_mode
    name: "Farm Evening Mode"
    icon: mdi:weather-sunset-down
    entities:
      input_boolean.irrigation_zone_1:
        state: "off"
      input_boolean.irrigation_zone_2:
        state: "off"
      input_boolean.irrigation_zone_3:
        state: "off"
      input_boolean.light_field:
        state: "off"
      input_boolean.light_barn:
        state: "on"

  - id: farm_all_irrigation_on
    name: "Farm All Irrigation On"
    icon: mdi:water
    entities:
      input_boolean.irrigation_zone_1:
        state: "on"
      input_boolean.irrigation_zone_2:
        state: "on"
      input_boolean.irrigation_zone_3:
        state: "on"

  - id: farm_all_irrigation_off
    name: "Farm All Irrigation Off"
    icon: mdi:water-off
    entities:
      input_boolean.irrigation_zone_1:
        state: "off"
      input_boolean.irrigation_zone_2:
        state: "off"
      input_boolean.irrigation_zone_3:
        state: "off"

  - id: farm_all_off
    name: "Farm All Off"
    icon: mdi:power-off
    entities:
      input_boolean.irrigation_zone_1:
        state: "off"
      input_boolean.irrigation_zone_2:
        state: "off"
      input_boolean.irrigation_zone_3:
        state: "off"
      input_boolean.light_barn:
        state: "off"
      input_boolean.light_field:
        state: "off"

  - id: farm_frost_protection
    name: "Farm Frost Protection"
    icon: mdi:snowflake-alert
    entities:
      input_boolean.irrigation_zone_1:
        state: "on"
      input_boolean.irrigation_zone_2:
        state: "on"
      input_boolean.irrigation_zone_3:
        state: "on"
      input_boolean.light_barn:
        state: "on"

  - id: farm_deep_water
    name: "Farm Deep Water"
    icon: mdi:water-plus
    entities:
      switch.tuya_master_valve_1:
        state: "on"
      switch.tuya_master_valve_2:
        state: "on"
      input_boolean.irrigation_zone_1:
        state: "on"
      input_boolean.irrigation_zone_2:
        state: "on"
      input_boolean.irrigation_zone_3:
        state: "on"

  - id: farm_quick_rinse
    name: "Farm Quick Rinse"
    icon: mdi:water-outline
    entities:
      switch.tuya_master_valve_1:
        state: "on"
      switch.tuya_master_valve_2:
        state: "on"

  - id: farm_emergency_shutoff
    name: "Farm Emergency Shutoff"
    icon: mdi:alert-octagon
    entities:
      switch.tuya_master_valve_1:
        state: "off"
      switch.tuya_master_valve_2:
        state: "off"
      input_boolean.irrigation_zone_1:
        state: "off"
      input_boolean.irrigation_zone_2:
        state: "off"
      input_boolean.irrigation_zone_3:
        state: "off"
      input_boolean.light_barn:
        state: "off"
      input_boolean.light_field:
        state: "off"
