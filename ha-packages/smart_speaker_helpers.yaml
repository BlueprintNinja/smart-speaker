# Smart Speaker Helpers - Ray's Berry Farm
# Seed entries to ensure the input_boolean and timer integrations are loaded,
# enabling REST API config endpoints for dynamic creation from the canvas.

input_boolean:
  sky_canvas_init:
    name: "Sky Canvas Init"
    icon: mdi:canvas
    initial: false
  # GIEX WiFi Dual-Zone Valve placeholders.
  # Mirrors switch.tuya_master_valve_1/2 when the physical hardware is not yet connected.
  # Once the Tuya integration is active, the bridge automation in master_valve_irrigation.yaml
  # will mirror these input_booleans to the real switch entities automatically.
  tuya_master_valve_1:
    name: "GIEX Valve 1 (Rows 1-4)"
    icon: mdi:valve
    initial: false
  tuya_master_valve_2:
    name: "GIEX Valve 2 (Rows 5-8)"
    icon: mdi:valve
    initial: false
  # Seed farm devices so scenes/automations can reference them immediately.
  # Canvas sync will manage these dynamically after first load.
  irrigation_zone_1:
    name: "Irrigation Zone 1"
    icon: mdi:water
    initial: false
  irrigation_zone_2:
    name: "Irrigation Zone 2"
    icon: mdi:water
    initial: false
  irrigation_zone_3:
    name: "Irrigation Zone 3"
    icon: mdi:water
    initial: false
  light_barn:
    name: "Barn Light"
    icon: mdi:lightbulb
    initial: false
  light_field:
    name: "Field Light"
    icon: mdi:lightbulb
    initial: false

timer:
  sky_init:
    name: "Sky Timer Init"
    duration: "00:00:01"
  sky_irrigation_zone_1:
    name: "Sky Irrigation Zone 1"
    duration: "00:30:00"
  sky_irrigation_zone_2:
    name: "Sky Irrigation Zone 2"
    duration: "00:30:00"
  sky_irrigation_zone_3:
    name: "Sky Irrigation Zone 3"
    duration: "00:20:00"
  sky_light_barn:
    name: "Sky Light Barn"
    duration: "01:00:00"
  sky_light_field:
    name: "Sky Light Field"
    duration: "01:00:00"

# REST command for HA automations to notify the backend on timer expiry
rest_command:
  sky_alert:
    url: "http://smart-speaker-backend:8000/alert"
    method: POST
    content_type: "application/json"
    payload: >
      {"sensor": "{{ sensor }}", "state": "{{ state }}",
       "message": "{{ message }}", "severity": "{{ severity }}"}

# Generic automation: fires when ANY Sky-managed timer finishes.
# Convention: timer.sky_{slug} → turns off input_boolean.{slug}
automation:
  - id: sky_timer_auto_off
    alias: "Sky - Timer Auto-Off"
    description: "Turns off the associated canvas device when a Sky timer expires"
    mode: queued
    max: 10
    trigger:
      - platform: event
        event_type: timer.finished
    condition:
      - condition: template
        value_template: "{{ trigger.event.data.entity_id.startswith('timer.sky_') }}"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: >
            input_boolean.{{ trigger.event.data.entity_id | replace('timer.sky_', '') }}
      - service: rest_command.sky_alert
        data:
          sensor: "input_boolean.{{ trigger.event.data.entity_id | replace('timer.sky_', '') }}"
          state: "timer_expired"
          message: >
            Timer expired — {{ trigger.event.data.entity_id
            | replace('timer.sky_', '') | replace('_', ' ') }} has been turned off.
          severity: "info"
