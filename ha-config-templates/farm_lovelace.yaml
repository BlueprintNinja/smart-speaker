title: Farm
views:
  - title: Ray's Berry Farm
    icon: mdi:sprout
    path: farm
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        forecast_type: daily
        name: Jersey County Forecast

      - type: entities
        title: RainPoint Soil Sensor
        icon: mdi:water
        entities:
          - entity: input_number.rainpoint_dry_threshold
            name: Dry Alert Threshold
          - entity: input_number.rainpoint_wet_threshold
            name: Wet Alert Threshold
          - entity: sensor.soil_moisture_status
            name: Soil Moisture Status
          - entity: sensor.soil_vpd_estimate
            name: Soil VPD Estimate

      - type: entities
        title: Growth & Season
        icon: mdi:sprout
        entities:
          - entity: sensor.farm_growth_stage
            name: Growth Stage
          - entity: sensor.farm_gdd
            name: GDD Accumulated
          - entity: sensor.farm_days_to_harvest
            name: Days to Harvest
          - entity: sensor.farm_chill_hours
            name: Chill Hours
          - entity: sensor.farm_chill_pct
            name: Chill Hours %

      - type: entities
        title: Risk Assessment
        icon: mdi:alert-circle
        entities:
          - entity: sensor.farm_yield_threat
            name: Yield Threat Score
          - entity: sensor.farm_fungal_risk
            name: Fungal Risk
          - entity: sensor.farm_frost_risk
            name: Frost Risk (7-day)
          - entity: sensor.farm_swd_risk
            name: SWD Pressure
          - entity: sensor.farm_nws_alerts
            name: Active NWS Alerts

      - type: entities
        title: Field Conditions
        icon: mdi:weather-partly-cloudy
        entities:
          - entity: sensor.farm_spray_window
            name: Spray Window
          - entity: sensor.farm_vpd
            name: Vapor Pressure Deficit
          - entity: sensor.farm_vpd_status
            name: VPD Status
          - entity: sensor.farm_soil_moisture
            name: Soil Moisture (0-7cm)
          - entity: sensor.farm_soil_temp
            name: Soil Temp (18cm)

      - type: entity-filter
        card:
          type: entities
          title: Canvas Devices (Status)
          icon: mdi:hexagon-multiple
        show_empty: false
        entities:
          - entity: sensor.canvas_irrigation_zone_1
          - entity: sensor.canvas_irrigation_zone_2
          - entity: sensor.canvas_irrigation_zone_3
          - entity: sensor.canvas_light_barn
          - entity: sensor.canvas_light_field
          - entity: sensor.canvas_tensiometer_field1
          - entity: sensor.canvas_tensiometer_field2
          - entity: sensor.canvas_rainpoint
          - entity: sensor.canvas_camera_barn
        state_filter:
          - operator: "!="
            value: "unavailable"

      - type: entity-filter
        card:
          type: entities
          title: Canvas Controls
          icon: mdi:toggle-switch
        show_empty: false
        entities:
          - entity: input_boolean.irrigation_zone_1
          - entity: input_boolean.irrigation_zone_2
          - entity: input_boolean.irrigation_zone_3
          - entity: input_boolean.light_barn
          - entity: input_boolean.light_field
        state_filter:
          - operator: "!="
            value: "unavailable"

      - type: entity-filter
        card:
          type: entities
          title: Active Timers
          icon: mdi:timer-outline
        show_empty: false
        entities:
          - entity: timer.sky_irrigation_zone_1
          - entity: timer.sky_irrigation_zone_2
          - entity: timer.sky_irrigation_zone_3
          - entity: timer.sky_light_barn
          - entity: timer.sky_light_field
        state_filter:
          - "active"
          - "paused"

  - title: Sky Assistant
    icon: mdi:robot
    path: sky
    cards:
      - type: markdown
        title: About Sky
        content: >
          **Sky** is the farm's AI voice assistant.
          She monitors all farm sensors, responds to voice commands,
          and speaks proactive alerts when thresholds are crossed.

          - **Chat:** http://localhost (Smart Speaker UI)
          - **Memory:** Spray logs, observations, and alerts are persisted
          - **Alerts:** HA automations POST to `/alert` when sensor thresholds trigger

      - type: entities
        title: Farm Bridge Sensors
        icon: mdi:antenna
        entities:
          - entity: sensor.farm_gdd
          - entity: sensor.farm_growth_stage
          - entity: sensor.farm_fungal_risk
          - entity: sensor.farm_swd_risk
          - entity: sensor.farm_spray_window
          - entity: sensor.farm_frost_risk
          - entity: sensor.farm_vpd
          - entity: sensor.farm_yield_threat
          - entity: sensor.farm_nws_alerts
          - entity: sensor.farm_days_to_harvest
          - entity: sensor.farm_soil_moisture
          - entity: sensor.farm_soil_temp
          - entity: sensor.farm_chill_hours
          - entity: sensor.farm_chill_pct
