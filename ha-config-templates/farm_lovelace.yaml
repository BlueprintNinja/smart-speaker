title: Farm
views:
  - title: Ray's Berry Farm
    icon: mdi:sprout
    path: farm
    cards:
      - type: weather-forecast
        entity: weather.forecast_home
        forecast_type: daily
        name: Jersey County Forecast

      - type: entities
        title: RainPoint Soil Sensor
        icon: mdi:water
        entities:
          - entity: input_number.rainpoint_dry_threshold
            name: Dry Alert Threshold
          - entity: input_number.rainpoint_wet_threshold
            name: Wet Alert Threshold
          - entity: sensor.soil_moisture_status
            name: Soil Moisture Status
          - entity: sensor.soil_vpd_estimate
            name: Soil VPD Estimate

      - type: entities
        title: Growth & Season
        icon: mdi:sprout
        entities:
          - entity: sensor.farm_growth_stage
            name: Growth Stage
          - entity: sensor.farm_gdd
            name: GDD Accumulated
          - entity: sensor.farm_days_to_harvest
            name: Days to Harvest
          - entity: sensor.farm_chill_hours
            name: Chill Hours
          - entity: sensor.farm_chill_pct
            name: Chill Hours %

      - type: entities
        title: Risk Assessment
        icon: mdi:alert-circle
        entities:
          - entity: sensor.farm_yield_threat
            name: Yield Threat Score
          - entity: sensor.farm_fungal_risk
            name: Fungal Risk
          - entity: sensor.farm_frost_risk
            name: Frost Risk (7-day)
          - entity: sensor.farm_swd_risk
            name: SWD Pressure
          - entity: sensor.farm_nws_alerts
            name: Active NWS Alerts

      - type: entities
        title: Field Conditions
        icon: mdi:weather-partly-cloudy
        entities:
          - entity: sensor.farm_spray_window
            name: Spray Window
          - entity: sensor.farm_vpd
            name: Vapor Pressure Deficit
          - entity: sensor.farm_vpd_status
            name: VPD Status
          - entity: sensor.farm_soil_moisture
            name: Soil Moisture (0-7cm)
          - entity: sensor.farm_soil_temp
            name: Soil Temp (18cm)

      - type: entities
        title: Blackberry Irrigation (Tuya Master Valve)
        icon: mdi:water-pump
        entities:
          - entity: input_boolean.tuya_master_valve_1
            name: Valve Outlet 1 (Rows 1-4)
          - entity: input_boolean.tuya_master_valve_2
            name: Valve Outlet 2 (Rows 5-8)
          - entity: sensor.blackberry_row_status
            name: Current Status
          - entity: sensor.soil_moisture_status
            name: Soil Status (RainPoint)
          - entity: input_number.rainpoint_wet_threshold
            name: Skip Irrigation Above
          - entity: automation.sky_irrigation_daily_gatekeeper
            name: Daily Gatekeeper
          - entity: script.manual_blackberry_watering
            name: Manual Watering (30min)

      - type: entity-filter
        card:
          type: entities
          title: Canvas Devices (Status)
          icon: mdi:hexagon-multiple
        show_empty: false
        entities:
          - entity: sensor.canvas_irrigation_zone_1
          - entity: sensor.canvas_irrigation_zone_2
          - entity: sensor.canvas_irrigation_zone_3
          - entity: sensor.canvas_light_barn
          - entity: sensor.canvas_light_field
          - entity: sensor.canvas_tensiometer_field1
          - entity: sensor.canvas_tensiometer_field2
          - entity: sensor.canvas_rainpoint
          - entity: sensor.canvas_camera_barn
        state_filter:
          - operator: "!="
            value: "unavailable"

      - type: entity-filter
        card:
          type: entities
          title: Canvas Controls
          icon: mdi:toggle-switch
        show_empty: false
        entities:
          - entity: input_boolean.irrigation_zone_1
          - entity: input_boolean.irrigation_zone_2
          - entity: input_boolean.irrigation_zone_3
          - entity: input_boolean.light_barn
          - entity: input_boolean.light_field
        state_filter:
          - operator: "!="
            value: "unavailable"

      - type: entity-filter
        card:
          type: entities
          title: Sky Timers
          icon: mdi:timer-outline
        show_empty: false
        entities:
          - entity: timer.sky_irrigation_zone_1
          - entity: timer.sky_irrigation_zone_2
          - entity: timer.sky_irrigation_zone_3
          - entity: timer.sky_light_barn
          - entity: timer.sky_light_field
          - entity: timer.sky_init
        state_filter:
          - "active"
          - "paused"
          - "idle"

      - type: entities
        title: Farm Scripts
        icon: mdi:script-text
        entities:
          - entity: script.irrigation_sequence
            name: Irrigation Sequence (All Zones)
          - entity: script.irrigate_zone
            name: Irrigate Single Zone
          - entity: input_number.irrigation_duration
            name: Default Duration (seconds)

  - title: Scenes & Automations
    icon: mdi:robot-outline
    path: scenes-automations
    cards:
      - type: markdown
        title: Quick Reference
        content: >
          **Voice commands:** "activate morning routine", "turn off frost protection automation"

          **Create via voice:** "When soil moisture drops below 20%, start irrigation zone 1"

      - type: entity-filter
        card:
          type: entities
          title: Farm Scenes
          icon: mdi:palette
        show_empty: false
        entities:
          # New names (Farm prefix)
          - entity: scene.farm_morning_routine
          - entity: scene.farm_evening_mode
          - entity: scene.farm_all_irrigation_on
          - entity: scene.farm_all_irrigation_off
          - entity: scene.farm_all_off
          - entity: scene.farm_frost_protection
          - entity: scene.farm_deep_water
          - entity: scene.farm_quick_rinse
          - entity: scene.farm_emergency_shutoff
          # Old names (before Farm prefix — HA caches first entity_id)
          - entity: scene.morning_routine
          - entity: scene.evening_mode
          - entity: scene.all_irrigation_on
          - entity: scene.all_irrigation_off
          - entity: scene.frost_protection
        state_filter:
          - operator: "!="
            value: "unavailable"

      - type: entity-filter
        card:
          type: entities
          title: Sky Automations — Irrigation
          icon: mdi:water
        show_empty: false
        entities:
          - entity: automation.sky_irrigation_daily_gatekeeper
          - entity: automation.sky_irrigation_weather_skip_notify
          - entity: automation.sky_auto_irrigate_low_moisture
          - entity: automation.sky_auto_irrigate_on_low_soil_moisture
          - entity: automation.sky_midday_irrigation_check
          - entity: automation.sky_midday_irrigation_safety_shutoff
          - entity: automation.sky_timer_auto_off
        state_filter:
          - "on"
          - "off"

      - type: entity-filter
        card:
          type: entities
          title: Sky Automations — Lighting
          icon: mdi:lightbulb
        show_empty: false
        entities:
          - entity: automation.sky_dawn_barn_lights
          - entity: automation.sky_dusk_field_lights_off
        state_filter:
          - "on"
          - "off"

      - type: entity-filter
        card:
          type: entities
          title: Sky Automations — Safety & Alerts
          icon: mdi:alert-circle
        show_empty: false
        entities:
          - entity: automation.sky_frost_protection
          - entity: automation.sky_high_fungal_risk
          - entity: automation.sky_high_fungal_risk_alert
        state_filter:
          - "on"
          - "off"

      - type: entity-filter
        card:
          type: entities
          title: Voice-Created Automations
          icon: mdi:microphone
        show_empty: false
        entities:
          - entity: automation.sky_voice_low_moisture_auto_irrigate
          - entity: automation.sky_voice_daily_barn_lights
          - entity: automation.sky_voice_evening_lights_off
          - entity: automation.sky_voice_morning_irrigation
          - entity: automation.sky_voice_frost_alert
          - entity: automation.sky_voice_weekly_deep_water
          - entity: automation.sky_voice_humidity_fan
          - entity: automation.sky_voice_rain_irrigation_off
        state_filter:
          - "on"
          - "off"

  - title: Schedule
    icon: mdi:calendar-clock
    path: schedule
    cards:
      - type: markdown
        title: Daily Farm Schedule
        content: >
          | Time | Event | Entities |
          |------|-------|----------|
          | **5:50 AM** | 🌊 Daily Irrigation Gatekeeper | GIEX Valve 1 + 2 |
          | **5:55 AM** | ⚠ Weather Skip Check | (notification only) |
          | **6:00 AM** | 🌱 Rainwave A — Rows 1-4 | 4 zones × 15min |
          | **7:00 AM** | 🌱 Rainwave B — Rows 5-8 | 4 zones × 15min |
          | **☀ Sunrise-30m** | 💡 Dawn Barn Lights | Barn Light |
          | **2:00 PM** | 🚫 Midday Safety Shutoff | All irrigation |
          | **🌙 Sunset+1h** | 💡 Dusk Field Lights Off | Field Light |

      - type: entities
        title: Irrigation Automations
        icon: mdi:water-pump
        entities:
          - entity: automation.sky_irrigation_daily_gatekeeper
            name: Daily Gatekeeper (5:50 AM)
          - entity: automation.sky_irrigation_weather_skip_notify
            name: Weather Skip Notify (5:55 AM)
          - entity: automation.sky_midday_irrigation_check
            name: Midday Shutoff (2:00 PM)
          - entity: automation.sky_auto_irrigate_low_moisture
            name: Auto-Irrigate (Low Moisture)

      - type: entities
        title: Lighting Automations
        icon: mdi:lightbulb-group
        entities:
          - entity: automation.sky_dawn_barn_lights
            name: Dawn Barn Lights (Sunrise-30m)
          - entity: automation.sky_dusk_field_lights_off
            name: Dusk Field Lights Off (Sunset+1h)

      - type: entities
        title: Safety & Alert Automations
        icon: mdi:shield-alert
        entities:
          - entity: automation.sky_frost_protection
            name: Frost Protection (Temp < 2°C)
          - entity: automation.sky_high_fungal_risk
            name: High Fungal Risk (> 70%)

      - type: entity-filter
        card:
          type: entities
          title: Active Timers
          icon: mdi:timer-outline
        show_empty: false
        entities:
          - entity: timer.sky_irrigation_zone_1
          - entity: timer.sky_irrigation_zone_2
          - entity: timer.sky_irrigation_zone_3
          - entity: timer.sky_light_barn
          - entity: timer.sky_light_field
          - entity: timer.sky_init
        state_filter:
          - "active"
          - "paused"
          - "idle"

      - type: entities
        title: Quick Actions
        icon: mdi:lightning-bolt
        entities:
          - entity: scene.farm_deep_water
            name: Deep Water (All Valves On)
          - entity: scene.farm_quick_rinse
            name: Quick Rinse (5min)
          - entity: scene.farm_emergency_shutoff
            name: Emergency Shutoff (Everything Off)
          - entity: script.manual_blackberry_watering
            name: Manual Watering (30min)

  - title: Sky Assistant
    icon: mdi:robot
    path: sky
    cards:
      - type: markdown
        title: About Sky
        content: >
          **Sky** is the farm's AI voice assistant.
          She monitors all farm sensors, responds to voice commands,
          and speaks proactive alerts when thresholds are crossed.

          - **Chat:** https://192.168.254.131 (Smart Speaker UI)
          - **Memory:** Spray logs, observations, and alerts are persisted
          - **Alerts:** HA automations POST to `/alert` when sensor thresholds trigger
          - **Scenes:** "activate morning routine", "activate frost protection"
          - **Automations:** "create an automation to irrigate when moisture drops below 20%"

      - type: entities
        title: Farm Bridge Sensors
        icon: mdi:antenna
        entities:
          - entity: sensor.farm_gdd
          - entity: sensor.farm_growth_stage
          - entity: sensor.farm_fungal_risk
          - entity: sensor.farm_swd_risk
          - entity: sensor.farm_spray_window
          - entity: sensor.farm_frost_risk
          - entity: sensor.farm_vpd
          - entity: sensor.farm_yield_threat
          - entity: sensor.farm_nws_alerts
          - entity: sensor.farm_days_to_harvest
          - entity: sensor.farm_soil_moisture
          - entity: sensor.farm_soil_temp
          - entity: sensor.farm_chill_hours
          - entity: sensor.farm_chill_pct
